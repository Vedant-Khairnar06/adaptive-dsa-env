name: dsa_env
description: DSA reasoning environment with RL feedback

tasks:
  - name: basic
    description: Solve basic DSA questions
  - name: debug
    description: Debug incorrect implementations
  - name: optimize
    description: Improve algorithm efficiency

observation_space:
  type: object
  properties:
    question:
      type: string
    difficulty:
      type: string
    score:
      type: number
    task:
      type: string
  required:
    - question
    - difficulty
    - score
    - task

action_space:
  type: object
  properties:
    answer:
      type: string
  required:
    - answer

reward_range:
  min: 0.0
  max: 1.0
